<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirrortable | Angel Investing Interface</title>
    <style>
        /* ============================
           CSS STYLES
           ============================ */
        :root {
            --primary-blue: #3b82f6;
            --primary-blue-hover: #2563eb;
            --success-green: #10b981;
            --success-green-hover: #059669;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 32px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            margin-top: 0;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Badge for the 'Beta' look */
        .badge {
            background-color: #dbeafe;
            color: #1e40af;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 12px;
            vertical-align: middle;
            margin-left: 8px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-connect {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-connect:hover {
            background-color: var(--primary-blue-hover);
        }

        .btn-invest {
            background-color: var(--success-green);
            color: white;
            margin-top: 16px;
        }

        .btn-invest:hover:not(:disabled) {
            background-color: var(--success-green-hover);
        }

        .btn:disabled {
            background-color: #a7f3d0;
            cursor: not-allowed;
        }

        /* Form Elements */
        .input-group {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 4px 12px;
            margin-bottom: 8px;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input {
            flex-grow: 1;
            border: none;
            padding: 12px 0;
            font-size: 18px;
            outline: none;
            color: var(--text-main);
        }

        .currency-label {
            font-weight: 600;
            color: var(--text-sub);
            padding-left: 12px;
            font-size: 16px;
        }

        /* Wallet Info Header */
        .wallet-info {
            background-color: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--text-sub);
            display: inline-flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--success-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Status & Feedback */
        .status-area {
            margin-top: 20px;
            min-height: 40px;
        }

        .status-text {
            font-size: 14px;
            color: var(--text-sub);
            animation: fadeIn 0.3s ease;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: var(--success-green);
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .etherscan-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 13px;
            color: var(--primary-blue);
            text-decoration: none;
        }
        
        .etherscan-link:hover {
            text-decoration: underline;
        }

        /* Utility classes for toggling views */
        .hidden {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Mirrortable <span class="badge">BETA</span></h1>
            <p class="subtitle">Securely invest USDC directly from your ENS. <br>Receive on-chain mirrorshares instantly.</p>

            <div id="view-connect">
                <button class="btn btn-connect" onclick="mockConnectWallet()">
                    Connect Wallet
                </button>
            </div>

            <div id="view-invest" class="hidden">
                <div class="wallet-info">
                    <span class="dot"></span>
                    <span id="wallet-address">0x...</span>
                </div>

                <div class="input-group">
                    <input type="number" id="amount-input" placeholder="0.00" autocomplete="off">
                    <span class="currency-label">USDC</span>
                </div>

                <button id="invest-btn" class="btn btn-invest" onclick="mockInvest()">
                    Invest Now
                </button>

                <div class="status-area" id="status-area">
                    </div>
            </div>
        </div>
    </div>

    <script>
        /* ============================
           MOCK LOGIC (Simulates React/Ethers)
           ============================ */

        // Simulated Wallet Address
        const MOCK_WALLET = "0x71C...9A23";

        function mockConnectWallet() {
            const btn = document.querySelector('.btn-connect');
            btn.innerHTML = "Connecting...";
            btn.style.opacity = "0.7";

            // Simulate network delay
            setTimeout(() => {
                document.getElementById('view-connect').classList.add('hidden');
                document.getElementById('view-invest').classList.remove('hidden');
                document.getElementById('wallet-address').innerText = "alice.eth (" + MOCK_WALLET + ")";
            }, 800);
        }

        function mockInvest() {
            const amount = document.getElementById('amount-input').value;
            const btn = document.getElementById('invest-btn');
            const statusArea = document.getElementById('status-area');

            if (!amount || amount <= 0) {
                statusArea.innerHTML = `<p class="status-text" style="color:#ef4444;">Please enter a valid amount.</p>`;
                return;
            }

            // 1. STATE: PROCESSING
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span> Processing...`;
            statusArea.innerHTML = `<p class="status-text">Waiting for signature...</p>`;

            // Simulate Step 1: Wallet Signature Delay
            setTimeout(() => {
                statusArea.innerHTML = `<p class="status-text">Transaction sent to Ethereum. <br>Bridge is detecting event...</p>`;

                // Simulate Step 2: Blockchain Mining & Bridge Sync
                setTimeout(() => {
                    // 2. STATE: SUCCESS
                    btn.innerHTML = "Invested";
                    btn.style.backgroundColor = "#059669"; // Darker green
                    
                    const txHash = "0x88d9...3b1a";
                    statusArea.innerHTML = `
                        <p class="status-text" style="color:var(--text-main); font-weight:500;">
                            ✅ Success! You own ${amount} mirrorshares.
                        </p>
                        <a href="#" class="etherscan-link">View on Etherscan ↗</a>
                    `;
                    
                    // Reset UI after 5 seconds for demo purposes
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = "Invest Again";
                        document.getElementById('amount-input').value = "";
                        statusArea.innerHTML = ""; 
                    }, 6000);

                }, 2500); // 2.5s mining delay

            }, 1000); // 1s signature delay
        }
    </script>
</body>
</html>
